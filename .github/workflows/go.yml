name: Build bookget for macOS Apple Silicon

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --out-format=colored-line-number

  build-macos-arm64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Build macOS Apple Silicon package
        run: make package-macos-arm64

      - name: Verify artifacts
        run: ls -R dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookget-macos-arm64
          path: |
            dist/darwin-arm64/bookget-macos-arm64
            dist/bookget-macos-arm64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files for debugging
        run: find dist/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "bookget ${{ github.ref_name }}"
          body: |
            Automated release for macOS Apple Silicon.

            Asset:
            - `bookget-macos-arm64.tar.gz`
          files: |
            dist/**/bookget-macos-arm64*
